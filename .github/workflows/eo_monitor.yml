name: White House Executive Order Monitor

on:
  workflow_dispatch:   # allows manual run
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run executive order monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROTON_SMTP_USERNAME: ${{ secrets.PROTON_SMTP_USERNAME }}
          PROTON_SMTP_TOKEN: ${{ secrets.PROTON_SMTP_TOKEN }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python check_whitehouse_eo.py

      - name: Commit updated state
        run: |
          git config --global user.name "eo-monitor-bot"
          git config --global user.email "actions@github.com"
          git add agent_state.json
          git commit -m "Update agent state [skip ci]" || echo "No changes"
          git push
